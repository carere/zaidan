stories:
  - name: "Data Table Filter TST integration renders correctly"
    url: "http://localhost:3000/registry/shadcn/data-table-filter-tst"
    workflow: |
      1. Verify the page loads without console errors
      2. Verify the component preview section is visible
      3. Interact with the component's primary trigger (Filter button)
      4. Verify expected behavior (filter panel opens, filter options visible)
      5. Scroll to the Examples section
      6. Verify all example variants are rendered
  - name: "Data Table Filter TST documentation is complete"
    url: "http://localhost:3000/registry/shadcn/data-table-filter-tst"
    workflow: |
      1. Verify the page title is "Data Table Filter TST"
      2. Verify the Installation section exists
      3. Verify the Usage section exists with code blocks
      4. Verify the Examples section lists all variants
      5. Scroll to the bottom of the page
      6. Verify no broken links or missing images
