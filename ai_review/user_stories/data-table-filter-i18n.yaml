stories:
  - name: "Data Table Filter i18n module loads and exports correctly"
    url: "http://localhost:3000/registry/bazza/data-table-filter"
    workflow: |
      1. Verify the page loads without console errors
      2. Verify the data table filter component preview section is visible
      3. Interact with the filter triggers to open filter dropdowns
      4. Verify filter labels and operator text are displayed in English by default
      5. Scroll to the Examples section
      6. Verify all example variants are rendered
  - name: "Data Table Filter i18n locale files are valid JSON"
    url: "http://localhost:3000/registry/bazza/data-table-filter"
    workflow: |
      1. Verify the page loads without console errors
      2. Verify the component preview section is visible
      3. Verify filter UI elements display text matching locale keys (clear, search, filter, operators)
      4. Verify filter operator labels are visible when a filter is opened
      5. Scroll to the bottom of the page
      6. Verify no broken links or missing images
